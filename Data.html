<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Fence Dashboard</title>
<style>
    body { background: #121212; color: white; font-family: Arial, sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th, td { border: 1px solid #555; padding: 8px; text-align: center; }
    th { background: #222; }
    .status-safe { color: #22C55E; font-weight: bold; }
    .status-danger { color: #EF4444; font-weight: bold; }
    button { padding: 8px 16px; margin: 5px 0; cursor: pointer; }
</style>
</head>
<body>

<h2>Detection Log Table</h2>
<table id="logTable">
    <thead>
        <tr>
            <th>Waypoint</th><th>GPS</th><th>Voltage</th><th>RFID</th>
            <th>Status</th><th>Time</th><th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Fence Table (Inventory)</h2>
<button id="exportFenceCSV">Download Fence CSV</button>
<table id="fenceTable">
    <thead>
        <tr>
            <th>Mission ID</th><th>Owner</th><th>Location</th><th>Voltage</th><th>Fence ID</th><th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
// Demo mission data
const demo = {
    missionId:'M-2025-09-15-01',
    waypoints:15,
    activeFences:12,
    authorized:9,
    unauthorized:3,
    detections: [
        {wp:"WP-01", gps:"11.074666N, 76.615677E", voltage: 3200, rfid:"RF123", status:"Authorized", time:"10:00", action:"None"},
        {wp:"WP-02", gps:"11.074720N, 76.616359E", voltage: 2900, rfid:"RF124", status:"Unauthorized", time:"10:05", action:"Alert"},
        {wp:"WP-03", gps:"11.073617N, 76.615766E", voltage: 3100, rfid:"RF125", status:"Authorized", time:"10:10", action:"None"}
    ]
};

// Render detection log
function renderMission(m) {
    const tbody = document.querySelector('#logTable tbody');
    tbody.innerHTML = '';
    (m.detections||[]).forEach(r=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.wp}</td><td>${r.gps}</td><td>${r.voltage} kV</td>
                        <td>${r.rfid||'N/A'}</td>
                        <td class='${r.status==='Authorized'?'status-safe':'status-danger'}'>${r.status}</td>
                        <td>${r.time}</td><td>${r.action}</td>`;
        tbody.appendChild(tr);
    });
}

// Random fence data generator
function generateRandomFenceData(numRows = 10) {
    const lats = [11.074666, 11.074720, 11.073617, 11.073653];
    const lons = [76.615677, 76.616359, 76.615766, 76.616550];
    const minLat = Math.min(...lats), maxLat = Math.max(...lats);
    const minLon = Math.min(...lons), maxLon = Math.max(...lons);
    const owners = ["Mr. Aman Nair", "Ms. Ravi Menon", "Mrs. Sita Pillai", "Mr. Kiran Kumar", "Mr. Ashfaq Koya", "Ms. Anjali Varma", "Mrs. Priya Panicker", "Mr. Rohit Tharakan", "Ms. Neha Mathew", "Mr. Aditya Jose"];
    const statuses = ["Active", "Inactive"];
    const data = [];
    for (let i=0;i<numRows;i++){
        const lat = (Math.random()*(maxLat-minLat)+minLat).toFixed(6);
        const lon = (Math.random()*(maxLon-minLon)+minLon).toFixed(6);
        const coord = `${lat},${lon}`;
        data.push({
            Mission_ID:`M${Math.floor(Math.random()*900+100)}`,
            Owner:owners[Math.floor(Math.random()*owners.length)],
            Location:coord,
            Voltage:(Math.random()*(5000-2000)+2000).toFixed(2),
            Fence_ID:`F${Math.floor(Math.random()*10+1)}`,
            Status:statuses[Math.floor(Math.random()*statuses.length)]
        });
    }
    return data;
}

// Render fence table
function renderFenceTable() {
    const data = generateRandomFenceData(10);
    const tbody = document.querySelector("#fenceTable tbody");
    tbody.innerHTML = "";
    data.forEach(row=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${row.Mission_ID}</td><td>${row.Owner}</td><td>${row.Location}</td>
                        <td>${row.Voltage} V</td><td>${row.Fence_ID}</td>
                        <td class="${row.Status==='Active'?'status-safe':'status-danger'}">${row.Status}</td>`;
        tbody.appendChild(tr);
    });
    return data;
}

// CSV download
function downloadFenceCSV(data) {
    if(!data || data.length===0) return alert("No data to export");
    const rows = [["Mission_ID","Owner","Location","Voltage","Fence_ID","Status"]];
    data.forEach(r=>rows.push([r.Mission_ID,r.Owner,r.Location,r.Voltage,r.Fence_ID,r.Status]));
    const csv = rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='fence_data.csv'; a.click();
    URL.revokeObjectURL(url);
}

// Initialize on load
window.onload = ()=>{
    renderMission(demo);
    const fenceData = renderFenceTable();
    const exportBtn = document.getElementById("exportFenceCSV");
    if(exportBtn) exportBtn.addEventListener("click", ()=>downloadFenceCSV(fenceData));
};
</script>
</body>
</html>
